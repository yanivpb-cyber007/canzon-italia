workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Analyze
        script: flutter analyze
      - name: Run unit tests
        script: flutter test
      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign
      - name: Package IPA for sideloading
        script: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r CanzonItalia.ipa Payload/
          rm -rf Payload/
    artifacts:
      - CanzonItalia.ipa
    publishing:
      email:
        recipients:
          - yanivpb@gmail.com
        notify:
          success: true
          failure: true
